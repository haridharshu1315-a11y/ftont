<!DOCTYPE html>
<html>
<head>
<title>Instagram Clone</title>

<style>

body{
font-family:Arial,sans-serif;
background:#fafafa;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
width:350px;
background:white;
padding:30px;
border:1px solid #dbdbdb;
text-align:center;
}

.logo{
font-size:40px;
font-weight:bold;
margin-bottom:20px;
}

input{
width:100%;
padding:10px;
margin:8px 0;
border:1px solid #dbdbdb;
}

button{
width:100%;
padding:10px;
background:#0095f6;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

p{
color:gray;
}

</style>

</head>

<body>

<div class="container">

<div class="logo">Instagram</div>

<input type="text" placeholder="Phone number, username or email">

<input type="password" placeholder="Password">

<button>Log In</button>

<p>Forgot Password?</p>

</div>

</body>

</html>
