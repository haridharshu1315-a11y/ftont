<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Employee Management System</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="sidebar">

<h2>EMS</h2>

<ul>

<li><i class="fa fa-house"></i> Dashboard</li>

<li><i class="fa fa-users"></i> Employees</li>

<li><i class="fa fa-building"></i> Departments</li>

<li><i class="fa fa-chart-line"></i> Reports</li>

<li onclick="logout()">
<i class="fa fa-right-from-bracket"></i>
Logout
</li>

</ul>

</div>

<div class="main">

<h1>Employee Management Dashboard</h1>

<div class="cards">
    <div class="top-bar">

<button onclick="toggleTheme()">
🌙 Dark / Light
</button>

<button onclick="window.print()">
🖨 Print
</button>

</div>

<div class="stats">

<div class="stat-box">
<h3 id="avgSalary">₹52,750</h3>
<p>Average Salary</p>

</div>

<div class="stat-box">
<h3 id="highestSalary">₹85,000</h3>
<p>Highest Salary</p>
</div>

<div class="stat-box">
<h3 id="lowestSalary">₹34,000</h3>
<p>Lowest Salary</p>
</div>

</div>

<div class="card">

<h2 id="totalEmp">20</h2>

<p>Total Employees</p>

</div>

<div class="card">

<h2>6</h2>

<p>Departments</p>

</div>

<div class="card">

<h2>₹10,55,000</h2>

<p>Total Salary</p>

</div>

</div>

<input
type="text"
id="search"
placeholder="Search Employee..."
onkeyup="searchEmployee()">

<table id="employeeTable">

<thead>

<tr>

<th>ID</th>
<th>Name</th>
<th>Age</th>
<th>Department</th>
<th>Salary</th>

</tr>

</thead>

<tbody id="tableBody">

</tbody>

</table>

</div>

<script src="script.js"></script>

</body>
</html>
